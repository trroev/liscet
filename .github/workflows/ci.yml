name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-flight runs on the same PR/branch, but never cancel a
# push-to-main run (a follow-up push must not abort the post-merge run).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ACT: "${{ false }}"
  # Vercel Remote Cache — turbo reads these from the environment automatically.
  # Workflow-level env flows into composite actions (the secrets context does not).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # `--affected` base/head — turbo reads these automatically (same flow as TURBO_TOKEN).
  # Defined once here so the typecheck/test/coverage jobs share one consistent base
  # and there is no per-action drift. On a PR, diff HEAD against the PR base; on a push
  # to main, diff against the previous commit. workflow_dispatch leaves BASE empty, so
  # turbo safely falls back to "all packages affected". Jobs that don't use --affected
  # (generate-types, lint, e2e) ignore these. Requires fetch-depth: 0 so the base SHA
  # is present for `git merge-base`.
  TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
  TURBO_SCM_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

permissions:
  contents: read

jobs:
  generate-types:
    runs-on: ubuntu-latest
    name: Generate Types
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Generate Types
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/generate-types

  lint:
    runs-on: ubuntu-latest
    name: Lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Lint
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/lint

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Typecheck
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/typecheck

  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Test
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Coverage
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/coverage

  e2e:
    runs-on: ubuntu-latest
    name: E2E
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BETTER_AUTH_SECRET: e2e-better-auth-secret-min-32-chars-long
      BETTER_AUTH_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      PAYLOAD_SECRET: e2e-payload-secret-min-32-characters-long
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/e2e
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Strip committed DATABASE_URL
        if: env.ACT != 'true'
        shell: bash
        # The committed app env files pin DATABASE_URL to a localhost default
        # loaded by dotenvx (generate:types) and @next/env (next start). Strip
        # it on the runner so the workflow-level value (pointing at the
        # postgres service container) wins.
        run: |
          for f in apps/web/.env.development apps/web/.env.production; do
            if [ -f "$f" ]; then
              sed -i -E '/^DATABASE_URL=/d' "$f"
            fi
          done
      - name: E2E
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/e2e
